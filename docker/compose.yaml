services:
  db:
    image: postgres:16
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    ports:
      - "${ADMINER_PORT}:8080"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile_app
    restart: always
    depends_on:
      - db
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
      NOM: ${NOM}
      PORT: ${APP_PORT}
      FLASK_DEBUG: ${FLASK_DEBUG}
    ports:
      - "${APP_PORT}:5000"

volumes:
  postgres_data:
