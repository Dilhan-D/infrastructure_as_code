<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Flask</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,.15);
            width: 420px;
            text-align: center;
        }

        h1 {
            color: #0d6efd;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .info {
            margin-top: 20px;
            padding: 12px;
            background: #eef5ff;
            border-radius: 8px;
        }

        strong {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🐳</h1>

    <p>Bienvenue <strong>{{ nom }}</strong> !</p>

    <div class="info">
        <p><strong>Hostname :</strong> {{ hostname }}</p>
    </div>

    <p>Application exécutée dans un conteneur Docker.</p>
</div>

</body>
</html>
